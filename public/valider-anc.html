<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validation des estimations ANC — RMS EcoSky</title>
<style>
  :root { --bleu: #1F4E78; --bleu-clair: #2E75B6; --vert: #2e7d32; --fond: #f4f6f8; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--fond); color: #222; padding: 32px 24px; }
  h1 { color: var(--bleu); font-size: 1.4rem; margin-bottom: 4px; }
  p.sous-titre { color: #666; margin-bottom: 28px; }
  .liste { display: flex; flex-direction: column; gap: 16px; max-width: 720px; margin: 0 auto; }
  .carte {
    background: #fff; border: 1px solid #dde3ea; border-radius: 12px; padding: 20px 24px;
  }
  .carte h2 { margin: 0 0 4px; color: var(--bleu); font-size: 1.1rem; }
  .carte .meta { color: #666; font-size: 0.88rem; margin-bottom: 12px; }
  .carte .meta a { color: var(--bleu-clair); }
  .champ-montant { display: flex; align-items: center; gap: 8px; margin: 14px 0; }
  .champ-montant label { font-weight: bold; font-size: 0.9rem; }
  .champ-montant input {
    width: 140px; padding: 8px 10px; border: 1px solid #ccd3db; border-radius: 8px; font-size: 1rem;
  }
  .champ-montant span { color: #666; font-size: 0.88rem; }
  .attention { color: #b26a00; font-size: 0.85rem; margin-top: -6px; margin-bottom: 10px; }
  button.valider {
    background: var(--bleu); color: #fff; border: none; border-radius: 8px;
    padding: 10px 20px; font-weight: bold; cursor: pointer; font-size: 0.95rem;
  }
  button.valider:hover { background: var(--bleu-clair); }
  button.valider:disabled { background: #9db3c4; cursor: not-allowed; }
  .vide, .chargement { text-align: center; color: #888; margin-top: 60px; }
  .confirmation { color: var(--vert); font-weight: bold; margin-top: 10px; }
</style>
</head>
<body>

<h1>Estimations ANC en attente de validation</h1>
<p class="sous-titre">Vérifie chaque demande, ajuste le montant si besoin, puis valide pour envoyer le devis définitif au client.</p>

<div class="liste" id="liste">
  <div class="chargement">Chargement...</div>
</div>

<script>
(async function () {
  const conteneur = document.getElementById("liste");

  function rendreCarte(lead) {
    const detail = lead.estimation_detail || {};
    const montantActuel = lead.estimation_totale_ht;
    const carte = document.createElement("div");
    carte.className = "carte";
    carte.dataset.leadId = lead.id;

    carte.innerHTML = `
      <h2>${lead.prenom || "—"}</h2>
      <div class="meta">
        ${lead.telephone || "—"} · ${lead.email || "—"}<br>
        ${lead.adresse_projet || "—"}<br>
        ${detail.filiere || lead.filiere_indicative || "—"} — ${lead.eh || "?"} EH
        ${lead.etude_sol_pdf_url ? `· <a href="${lead.etude_sol_pdf_url}" target="_blank">étude de sol</a>` : ""}
      </div>
      ${montantActuel == null ? '<div class="attention">⚠️ Aucun montant calculé automatiquement (hors grille) — renseigne le montant final avant de valider.</div>' : ""}
      <div class="champ-montant">
        <label>Montant final :</label>
        <input type="number" step="50" value="${montantActuel != null ? montantActuel : ""}" placeholder="€ HT">
        <span>€ HT</span>
      </div>
      <button class="valider">Valider et envoyer</button>
      <div class="confirmation" style="display:none;"></div>
    `;

    const input = carte.querySelector("input");
    const bouton = carte.querySelector("button.valider");
    const confirmation = carte.querySelector(".confirmation");

    bouton.addEventListener("click", async () => {
      const montant = Number(input.value);
      if (!montant || montant <= 0) {
        alert("Renseigne un montant valide avant de valider.");
        return;
      }
      bouton.disabled = true;
      bouton.textContent = "Envoi en cours...";
      try {
        const reponse = await fetch("/api/valider-estimation-anc", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ leadId: lead.id, montantFinalHT: montant }),
        });
        if (!reponse.ok) throw new Error("Échec validation");
        confirmation.style.display = "block";
        confirmation.textContent = "✓ Devis envoyé au client";
        bouton.style.display = "none";
        input.disabled = true;
      } catch (err) {
        bouton.disabled = false;
        bouton.textContent = "Valider et envoyer";
        alert("Erreur lors de l'envoi — réessaie ou vérifie les logs.");
      }
    });

    return carte;
  }

  try {
    const reponse = await fetch("/api/leads-anc-en-attente");
    const resultat = await reponse.json();
    const leads = resultat.leads || [];

    conteneur.innerHTML = "";
    if (leads.length === 0) {
      conteneur.innerHTML = '<div class="vide">Aucune demande en attente 🎉</div>';
      return;
    }
    leads.forEach((lead) => conteneur.appendChild(rendreCarte(lead)));
  } catch (err) {
    conteneur.innerHTML = '<div class="vide">Erreur de chargement des demandes.</div>';
  }
})();
</script>

</body>
</html>
