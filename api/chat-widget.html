<!--
  WIDGET DE CHAT RMS ECOSKY
  =========================
  Comment l'installer sur ecoskybyrms.fr :
  1. Copie tout ce bloc de code.
  2. Colle-le juste avant la balise </body> de ton site (dans l'éditeur HTML de ton
     hébergeur / CMS — WordPress : widget "HTML personnalisé" en pied de page ; Wix :
     "Intégrer du code" ; site fait main : directement dans le fichier HTML).
  3. Change la ligne "const API_URL" ci-dessous par l'URL réelle de ton endpoint,
     ex : https://salesflow-ecosky.vercel.app/api/web-chat
  4. C'est tout — une bulle de chat apparaît en bas à droite de chaque page.
-->
<style>
  #ecosky-chat-bubble {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #1e6f4c;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    z-index: 9999;
    font-size: 28px;
    transition: transform 0.2s;
  }
  #ecosky-chat-bubble:hover { transform: scale(1.08); }

  #ecosky-chat-window {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 340px;
    max-width: 92vw;
    height: 480px;
    max-height: 75vh;
    background: white;
    border-radius: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 9999;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #ecosky-chat-window.open { display: flex; }

  #ecosky-chat-header {
    background: #1e6f4c;
    color: white;
    padding: 14px 16px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #ecosky-chat-header span.subtitle {
    display: block;
    font-weight: 400;
    font-size: 12px;
    opacity: 0.85;
    margin-top: 2px;
  }
  #ecosky-chat-close { cursor: pointer; font-size: 20px; line-height: 1; }

  #ecosky-chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    background: #f5f7f6;
  }
  .ecosky-msg {
    max-width: 80%;
    margin-bottom: 10px;
    padding: 9px 12px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .ecosky-msg.assistant {
    background: white;
    border: 1px solid #e0e0e0;
    align-self: flex-start;
    margin-right: auto;
  }
  .ecosky-msg.user {
    background: #1e6f4c;
    color: white;
    margin-left: auto;
  }
  .ecosky-msg a {
    color: inherit;
    text-decoration: underline;
    word-break: break-all;
  }
  .ecosky-link-button {
    display: block;
    margin-top: 8px;
    padding: 9px 14px;
    background: #f0f8f4;
    border: 1px solid #1e6f4c;
    border-radius: 10px;
    color: #1e6f4c !important;
    text-decoration: none !important;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    transition: background 0.15s;
  }
  .ecosky-link-button:hover {
    background: #dcefe6;
  }
  #ecosky-chat-messages { display: flex; flex-direction: column; }

  #ecosky-chat-input-row {
    display: flex;
    border-top: 1px solid #e0e0e0;
    padding: 8px;
    gap: 8px;
  }
  #ecosky-chat-input {
    flex: 1;
    border: 1px solid #ccc;
    border-radius: 20px;
    padding: 9px 14px;
    font-size: 14px;
    outline: none;
  }
  #ecosky-chat-send {
    background: #1e6f4c;
    color: white;
    border: none;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    cursor: pointer;
    font-size: 16px;
  }
  #ecosky-chat-send:disabled { opacity: 0.5; cursor: default; }

  .ecosky-typing {
    font-size: 13px;
    color: #888;
    font-style: italic;
    margin-bottom: 10px;
  }

  /* Sur mobile, on laisse le catalogue visible en haut de l'écran pendant
     la conversation : la fenêtre de chat prend moins de place verticalement
     et reste ancrée en bas plutôt que de recouvrir tout l'écran. */
  @media (max-width: 480px) {
    #ecosky-chat-window {
      width: 100vw;
      max-width: 100vw;
      height: 52vh;
      max-height: 52vh;
      bottom: 0;
      right: 0;
      border-radius: 16px 16px 0 0;
    }
    #ecosky-chat-bubble {
      bottom: 16px;
      right: 16px;
    }
  }
</style>

<div id="ecosky-chat-bubble" title="Discuter avec RMS EcoSky">&#128172;</div>

<div id="ecosky-chat-window">
  <div id="ecosky-chat-header">
    <div>
      RMS EcoSky
      <span class="subtitle">R&eacute;ponse rapide, devis gratuit</span>
    </div>
    <div id="ecosky-chat-close">&#10005;</div>
  </div>
  <div id="ecosky-chat-messages"></div>
  <div id="ecosky-chat-input-row">
    <input id="ecosky-chat-input" type="text" placeholder="&Eacute;crivez votre message..." />
    <button id="ecosky-chat-send">&#10148;</button>
  </div>
</div>

<script>
(function () {
  // ⚠️ À ADAPTER : remplace par l'URL réelle de ton endpoint Vercel une fois déployé
  const API_URL = "https://salesflow-ecosky.vercel.app/api/web-chat";

  const bubble = document.getElementById("ecosky-chat-bubble");
  const win = document.getElementById("ecosky-chat-window");
  const closeBtn = document.getElementById("ecosky-chat-close");
  const messagesEl = document.getElementById("ecosky-chat-messages");
  const input = document.getElementById("ecosky-chat-input");
  const sendBtn = document.getElementById("ecosky-chat-send");

  // Session persistante : le visiteur garde le fil de la conversation même s'il
  // recharge la page ou revient plus tard (tant que c'est le même navigateur).
  // Si l'URL contient ?reset_chat=1, on efface la session précédente pour
  // repartir sur une conversation totalement neuve (pratique pour tester).
  const resetParams = new URLSearchParams(window.location.search);
  if (resetParams.get("reset_chat") === "1") {
    localStorage.removeItem("ecosky_chat_session");
    localStorage.removeItem("ecosky_chat_greeted");
  }

  let sessionId = localStorage.getItem("ecosky_chat_session");
  if (!sessionId) {
    sessionId = "web_" + crypto.randomUUID();
    localStorage.setItem("ecosky_chat_session", sessionId);
  }

  let hasGreeted = localStorage.getItem("ecosky_chat_greeted") === "1";

  // Transforme le texte brut en HTML sûr, puis extrait les liens pour les
  // afficher en boutons cliquables façon WhatsApp (plutôt qu'en lien souligné
  // au milieu du texte).
  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function labelForUrl(url) {
    const lower = url.toLowerCase();
    if (lower.includes("catalogue")) return "\uD83D\uDCD8 Voir le catalogue";
    if (lower.endsWith(".mp4") || lower.includes("video")) return "\uD83C\uDFA5 Voir la vid\u00e9o";
    if (lower.includes("/devis")) return "\uD83D\uDCF7 Envoyer mes photos";
    return "\uD83D\uDD17 Ouvrir le lien";
  }

  function addMessage(role, text) {
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    const urls = text.match(urlRegex) || [];
    const textWithoutUrls = text.replace(urlRegex, "").replace(/[ \t]+\n/g, "\n").trim();

    const container = document.createElement("div");
    container.className = "ecosky-msg " + role;

    if (textWithoutUrls) {
      const textDiv = document.createElement("div");
      textDiv.innerHTML = escapeHtml(textWithoutUrls);
      container.appendChild(textDiv);
    }

    urls.forEach((url) => {
      const btn = document.createElement("a");
      btn.href = url;
      btn.target = "_blank";
      btn.rel = "noopener noreferrer";
      btn.className = "ecosky-link-button";
      btn.textContent = labelForUrl(url);
      container.appendChild(btn);
    });

    messagesEl.appendChild(container);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "ecosky-typing";
    div.id = "ecosky-typing-indicator";
    div.textContent = "RMS EcoSky \u00e9crit...";
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById("ecosky-typing-indicator");
    if (el) el.remove();
  }

  async function sendMessage(text) {
    addMessage("user", text);
    input.value = "";
    sendBtn.disabled = true;
    showTyping();
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      const data = await res.json();
      hideTyping();
      addMessage("assistant", data.reply || "D\u00e9sol\u00e9, une erreur est survenue.");
    } catch (err) {
      hideTyping();
      addMessage("assistant", "D\u00e9sol\u00e9, une erreur de connexion est survenue. R\u00e9essayez dans un instant.");
    } finally {
      sendBtn.disabled = false;
    }
  }

  const GREETING_DEFAULT =
    "Bonjour ! \uD83D\uDC4B Je suis l'\u00e9quipe RMS EcoSky. Vous avez un projet de terrasse, tour de piscine ou all\u00e9e en r\u00e9sine EPDM ? Dites-m'en un peu plus, je vous aide \u00e0 avancer !";

  const GREETING_CATALOGUE =
    "Bonjour ! \uD83D\uDC4B Vous consultez notre catalogue de r\u00e9alisations EcoSky'Gum. Quel type de projet vous int\u00e9resse \u2014 terrasse, tour de piscine, all\u00e9e ? Dites-le moi, je vous oriente et vous donne une premi\u00e8re estimation d\u00e8s que vous m'en dites un peu plus.";

  bubble.addEventListener("click", () => {
    win.classList.toggle("open");
    if (win.classList.contains("open") && !hasGreeted) {
      hasGreeted = true;
      localStorage.setItem("ecosky_chat_greeted", "1");
      const urlParams = new URLSearchParams(window.location.search);
      const greeting =
        urlParams.get("open_chat") === "1" ? GREETING_CATALOGUE : GREETING_DEFAULT;
      addMessage("assistant", greeting);
    }
  });

  closeBtn.addEventListener("click", () => win.classList.remove("open"));

  sendBtn.addEventListener("click", () => {
    const text = input.value.trim();
    if (text) sendMessage(text);
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const text = input.value.trim();
      if (text) sendMessage(text);
    }
  });

  // Ouverture automatique du chat si l'URL contient ?open_chat=1
  // (utilis\u00e9 pour les pubs Facebook qui pointent directement vers le chat)
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get("open_chat") === "1") {
    bubble.click();
  }
})();
</script>
